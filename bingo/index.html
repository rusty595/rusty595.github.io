<style type="text/css">
img {
	image-rendering: pixelated;
	display: flex;
}
.bingo-container-outer {
	max-width: 1080px;
}
.bingo-container {
	position: relative;
	padding-top: 0%;
	display: flex;
}
.bingo-tile {
	border: 0;
	float: left;
	position: relative;
}
.bingo-x {
	border: 0;
	position: absolute;
	top: 0;
	right: 0;
}
body {
	background-image: url("https://kyuppin.com/IMAGES/bg2.jpg");
	background-repeat: no-repeat;
	background-attachment: relative;
	background-position:top;
	background-color: rgb(243, 243, 243);
}
</style>

<body lang=EN-GB>
<div class="bingo-container-outer">
</div>
<script>
var tiles = ["img/belgië.png", "img/bognor.png", "img/bóbr.png", "img/focks.png", "img/he said it.png", "img/jersey 2.png", "img/kmt.png", "img/kot.png", "img/LA.png", "img/lennon.png", "img/me.png", "img/me.png", "img/mpreg.png", "img/nihon.png", "img/onyon.png", "img/racc.png", "img/racecar.png", "img/rrat.png", "img/segs.png", "img/trans wrongs.png", "img/UK.png", "img/untranslatable.png", "img/very large cone.png", "img/wyrm.png", "img/yike.png"];
var text = "";
for (var i = 0; i < 5; i++)
{
	text += "<div class=\"bingo-container\">";
	for (var j = 0; j < 5; j++)
	{
		text +="<div class=\"bingo-tile\">";
		if (i == 2 && j == 2)
		{
			text += "<img src=\"img/bideo jonkler.png\">";
		}
		else
		{
			var k = Math.floor(Math.random()*tiles.length);
			text += "<img src=\"" + tiles[k] + "\">";
			tiles.splice(k, 1);
		}
		text += "</div>";
	}
	text += "</div>";
}
var el = document.getElementsByClassName("bingo-container-outer")[0];
el.innerHTML += text;

const divs = document.querySelectorAll('.bingo-tile');

divs.forEach((div) => {
	div.addEventListener('click', (event) => {
		event.target.parentElement.innerHTML += "<img class=\"bingo-x\" src=\"img/x" + Math.floor(Math.random()*25) + ".png\" alt=\"\">";
	});
});
</script>
</body>
